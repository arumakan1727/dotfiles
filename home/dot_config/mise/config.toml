[settings]
always_keep_download = true
always_keep_install = true
python.compile = false  # always download precompiled binaries
cargo.binstall = true
pipx.uvx = true

# サプライチェーン: lockfile に固定した version/checksum/URL のみで取得・検証する(解決 API を極力叩かない)。
lockfile = true
locked = true
minimum_release_age = "7d"  # fuzzy 解決(latest/node@26 等)で「リリース後 7d 未満」を弾く。旧 MISE_INSTALL_BEFORE env の後継(deprecated: warn 2026.10/remove 2027.10)。config 化で非対話/CI でも効く。exact pin と lockfile 再現 install はバイパス
locked_verify_provenance = true  # lockfile の provenance(github-attestations 等)を毎 install で再検証する。既定 false はキャッシュ信頼で検証スキップ。provenance_api_failures_fatal(既定 true) と相まって API 障害時は hard fail
lockfile_platforms = ["linux-x64", "linux-arm64", "macos-arm64"]  # `mise lock` が常にこの3ターゲットを書く(手動 --platform 不要。明示時のみ上書き)。既定の全platform誤lockを防止

[settings.status]
missing_tools = "always"
show_env = true

[tools]
# Languages
bun = 'latest'
deno = 'latest'
go = 'latest'
java = "corretto-24"
node = '26.3'  # mise(2026.6.x)はメジャーのみ指定 '26' を exact 扱いして 404 にするバグがあるため minor まで固定
python = '3.14'
rust = '1.96'  # 旧 installer/rustup.sh から移行(core:rust)。cargo-binstall は下記参照。メジャーのみ指定バグ回避で minor 固定
zig = 'latest'

# Editor
neovim = 'stable'

# Installer / Package Manager
aqua = 'latest'  # mise がネイティブに aqua をバックエンドとして使えるので aqua コマンドはなくてもインストール可能だが、aqua のレジストリを探索したいときがあるので一応
uv = 'latest'
'pipx:poetry' = '2'  # registry 既定の asdf backend は locked=true 下で lockfile URL を要求して linux で失敗するため pipx に固定(pipx.uvx=true で uv 経由)
cargo-binstall = "latest"
pnpm = "latest"
usage = "latest"  # mise の補完/spec 用
# chezmoi は mise tool にしない: bootstrap(installer/pinned.toml + update-pins.sh)が
# 唯一の管理元。mise 自身と同じく「mise を立ち上げる前の trust anchor」なので、ここに置くと
# bootstrap 版と二重管理になり PATH で shadow し合う(mise activate 後は mise 版が優先)。更新は
# pinned.toml を update-pins.sh で。— 2026-06 に mise から除外(別マシンで version drift が判明)。
"npm:@aikidosec/safe-chain" = "latest"  # npm のサプライチェーン保護ラッパ

# Text Search
ripgrep = 'latest'
ripgrep-all = 'latest'
fzf = 'latest'

# Data Manipulation
'aqua:BurntSushi/xsv' = 'latest'  # registry に短縮名なし
dasel = 'latest'
delta = 'latest'
duckdb = "latest"
jq = 'latest'
jwt = 'latest'  # mike-engel/jwt-cli
yq = 'latest'
'go:github.com/abhimanyu003/sttr' = 'latest'  # aqua になし

# Explorer / Viewer
lsd = 'latest'
'aqua:noborus/ov' = 'latest'  # registry に短縮名なし
bat = 'latest'
fd = 'latest'
yazi = 'latest'
'cargo:eza' = 'latest'  # ls 代替(lsd と併用)。eza は macOS 公式/aqua バイナリ非配布のため cargo-binstall の quickinstall prebuilt(arm64・署名検証あり)で取得

# Git / GitHub
gh = 'latest'
lazygit = 'latest'
ghq = 'latest'
task = 'latest'
git-lfs = 'latest'  # brew から移行(aqua:git-lfs/git-lfs)
'aqua:simonwhitaker/gibo' = 'latest'  # registry に短縮名なし
pinact = 'latest'  # GitHub Actions を commit SHA に固定 (aqua:suzuki-shunsuke/pinact)。.github/workflows の Action ピンに使う

# System analysis
dua = 'latest'
dust = 'latest'
'aqua:dylanaraps/neofetch' = 'latest'  # registry に短縮名なし

# Network
xh = 'latest'

# Benchmarking
hyperfine = 'latest'

# Utilities
'aqua:sharkdp/pastel' = 'latest'  # registry に短縮名なし
'aqua:koki-develop/clive' = 'latest'  # registry に短縮名なし
typst = 'latest'  # 組版(aqua:typst/typst)。brew から移行
age = "latest"  # 暗号化
zoxide = "latest"

# Cloud/Infra
tfsec = 'latest'
'aqua:aws/aws-cli' = 'latest'  # aqua は .pkg でなく v2 バイナリを入れるため起動遅延を回避(旧 Homebrew 版から移行)
terraform = 'latest'
'aqua:twistedpair/google-cloud-sdk' = 'latest'  # gcloud の既定は vfox なので明示
"npm:@googleworkspace/cli" = "latest"

# Code Formater / Linter
stylua = 'latest'
hadolint = 'latest'
shellcheck = 'latest'
shfmt = 'latest'

# Build / Codegen (brew から移行)
cmake = 'latest'  # aqua:Kitware/CMake
protoc = 'latest'  # aqua:protocolbuffers/protobuf。旧 brew protobuf / protobuf@3 を集約

# AI Agent
"npm:@openai/codex" = "latest"
"npm:agent-browser" = "latest"
"npm:ccusage" = "latest"  # Claude Code 利用量トラッキング
"cargo:worktrunk" = "latest"  # git worktree manager
"cargo:raine/workmux" = "latest"  # git worktree and tmux manager
"npm:difit" = "latest"

# Neovim: LSP servers
# nvim は mason を使わず native vim.lsp.enable で PATH から発見する(供給網を mise に一本化)。
lua-language-server = 'latest'  # lua_ls
"go:golang.org/x/tools/gopls" = 'latest'  # gopls
"pipx:basedpyright" = 'latest'  # basedpyright(Python 型チェック。lint/format は ruff に分担)
ruff = 'latest'  # ruff: Python LSP + conform/nvim-lint の formatter/linter 兼用
"npm:yaml-language-server" = 'latest'  # yamlls
"npm:vscode-langservers-extracted" = 'latest'  # jsonls / cssls / html
taplo = 'latest'  # toml LSP + formatter
terraform-ls = 'latest'  # terraformls
"npm:bash-language-server" = 'latest'  # bashls
"npm:@prisma/language-server" = 'latest'  # prismals
"pipx:cmake-language-server" = 'latest'  # cmake LSP
# TypeScript は tsserver でなく tsgo(TS7 ネイティブ)。prerelease のみ + minimum_release_age=7d の
# ため dev 版を exact 固定。nvim-lspconfig の tsgo は project-local node_modules/.bin/tsgo を優先する。
"npm:@typescript/native-preview" = '7.0.0-dev.20260527.2'  # tsgo

# Neovim: treesitter / formatter / linter
tree-sitter = 'latest'  # nvim-treesitter のパーサビルドに必須(無いとハイライトが出ない)
"go:golang.org/x/tools/cmd/goimports" = 'latest'  # conform: goimports
golangci-lint = 'latest'  # nvim-lint: go
"npm:markdownlint-cli" = 'latest'  # nvim-lint: markdownlint
"pipx:yamllint" = 'latest'  # nvim-lint: yamllint
