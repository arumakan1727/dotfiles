[settings]
always_keep_download = true
always_keep_install = true
experimental = true
python.compile = false  # always download precompiled binaries
cargo.binstall = true
pipx.uvx = true
lockfile = true

[settings.status]
missing_tools = "always"
show_env = true

[tools]
# Languages
bun = 'latest'
deno = 'latest'
go = 'latest'
java = "corretto-24"
# node = [{ version = '24.4', postinstall = 'corepack enable'}, { version = '22', postinstall = 'corepack enable' }]
node = "24"
python = ['3.13', '3.12', '3.11']
zig = 'latest'

# Installer / Package Manager
aqua = 'latest'  # mise がネイティブに aqua をバックエンドとして使えるので aqua コマンドはなくてもインストール可能だが、aqua のレジストリを探索したいときがあるので一応
uv = 'latest'
poetry = ['1', '2']
cargo-binstall = "latest"
pnpm = "latest"
usage = "latest"  # mise の補完/spec 用
"npm:@aikidosec/safe-chain" = "latest"  # npm のサプライチェーン保護ラッパ

# Text Search
ripgrep = 'latest'
ripgrep-all = 'latest'
fzf = 'latest'

# Data Manipulation
'aqua:BurntSushi/xsv' = 'latest'  # registry に短縮名なし
dasel = 'latest'
delta = 'latest'
duckdb = "latest"
jq = 'latest'
jwt = 'latest'  # mike-engel/jwt-cli
yq = 'latest'
'go:github.com/abhimanyu003/sttr' = 'latest'  # aqua になし

# Explorer / Viewer
lsd = 'latest'
'aqua:noborus/ov' = 'latest'  # registry に短縮名なし
bat = 'latest'
fd = 'latest'
yazi = 'latest'

# Git / GitHub
gh = 'latest'
lazygit = 'latest'
ghq = 'latest'
task = 'latest'
'aqua:simonwhitaker/gibo' = 'latest'  # registry に短縮名なし

# System analysis
dua = 'latest'
dust = 'latest'
'aqua:dylanaraps/neofetch' = 'latest'  # registry に短縮名なし

# Network
xh = 'latest'

# Benchmarking
hyperfine = 'latest'

# Utilities
'aqua:sharkdp/pastel' = 'latest'  # registry に短縮名なし
'aqua:koki-develop/clive' = 'latest'  # registry に短縮名なし
age = "latest"  # 暗号化
zoxide = "latest"

# Cloud/Infra
tfsec = 'latest'
# 'aqua:aws/aws-cli' = 'latest'  # PKG版は起動が遅いのでHomebrew版を使用
terraform = 'latest'
'aqua:twistedpair/google-cloud-sdk' = 'latest'  # gcloud の既定は vfox なので明示
"pipx:awsume" = { version = "4.5.4", uvx_args = "--with awsume-console-plugin" }
"npm:@googleworkspace/cli" = "latest"

# Code Formater / Linter
stylua = 'latest'
hadolint = 'latest'
shellcheck = 'latest'
shfmt = 'latest'

# AI Agent
"npm:@openai/codex" = "latest"
"npm:agent-browser" = "latest"
"npm:ccusage" = "latest"  # Claude Code 利用量トラッキング
"cargo:worktrunk" = "latest"  # git worktree manager
"cargo:raine/workmux" = "latest"  # git worktree and tmux manager
